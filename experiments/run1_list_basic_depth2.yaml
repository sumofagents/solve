version: 1
name: run1-list-basic-depth2
lean:
  toolchain: leanprover/lean4:v4.31.0
  imports:
    - Mathlib.Data.List.Basic
corpus:
  namespace_prefixes:
    - List
  seed_limit: 120
  max_binders: 6
  max_statement_chars: 500
grammar:
  operators:
    - Eq.symm
    - Eq.trans
    - congrArg
    - Iff.intro
    - Iff.mp
    - Iff.mpr
  baseline_operators:
    - And.intro
    - Or.inl
    - Or.inr
bounds:
  max_depth: 2
  promotion_depth: 3
  max_candidates_total: 50000
  max_candidates_per_operator: 5000
  verify_timeout_ms: 1000
dedup:
  existing: defeq_imported_environment
  retained: defeq
promotion:
  require_replay: true
  require_not_existing_defeq: true
  require_downstream_use_within_depth: 3
consumer:
  name: used_by_downstream_verified_composition_within_depth_3
connectors:
  enabled: false
